<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT 67 - Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <a class="next" onclick="logout()">LOGOUT &#8594;</a>
    </div>

    <h1>PROJECT 67</h1>
    <h2>WELCOME</h2>

    <div class="hub-container">
        <div class="hub-box" onclick="window.location.href='chat.html'">
            <div class="hub-icon">💬</div>
            <h3>CHAT</h3>
            <p>Open live chat</p>
        </div>
        <div class="hub-box" onclick="window.location.href='sites.html'">
            <div class="hub-icon">🌐</div>
            <h3>EXTRAS</h3>
            <p>Browse sites</p>
        </div>
    </div>

    <!-- Admin access hidden section -->
    <div class="admin-access">
        <button class="admin-access-btn" onclick="promptAdminAccess()">⚙ ADMIN</button>
    </div>

    <!-- Admin password modal -->
    <div class="modal-overlay" id="adminModal" style="display:none;">
        <div class="modal-box">
            <h3>ADMIN ACCESS</h3>
            <input type="password" id="adminPasswordInput" placeholder="Enter password" />
            <div class="modal-btns">
                <button onclick="checkAdminPassword()">ENTER &#8594;</button>
                <button onclick="closeAdminModal()">CANCEL</button>
            </div>
            <p id="adminError" style="color:#cc0000; font-size:12px; margin-top:0.5rem; display:none;">Wrong password.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PROJECT 67. All rights reserved.</p>
        <p style="color:#444; font-size:11px; margin-top:4px;">VER.67.1</p>
        
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="script_new.js"></script>
    <script>
        function promptAdminAccess() {
            document.getElementById('adminModal').style.display = 'flex';
            document.getElementById('adminPasswordInput').value = '';
            document.getElementById('adminError').style.display = 'none';
            document.getElementById('adminPasswordInput').focus();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        function checkAdminPassword() {
            const input = document.getElementById('adminPasswordInput').value;
            if (input === '4656') {
                window.location.href = 'admin.html';
            } else {
                document.getElementById('adminError').style.display = 'block';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && document.getElementById('adminModal').style.display === 'flex') {
                checkAdminPassword();
            }
        });
    </script>

    <script>
        auth.onAuthStateChanged((user) => {
            if (user) {
                rtdb.ref("hacks/" + user.uid).on("value", (snap) => {
                    if (snap.val() && snap.val().hacked === true) {
                        rtdb.ref("hacks/" + user.uid).remove();
                        window.location.href = "hacked.html";
                    }
                });
            }
        });
    </script>

</body>
</html>
