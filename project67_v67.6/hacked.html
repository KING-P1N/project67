<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ SYSTEM ALERT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: monospace; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .hacked-text {
            font-size: 72px;
            color: #cc0000;
            font-weight: bold;
            text-align: center;
            animation: blink 0.6s infinite;
            text-shadow: 0 0 40px #cc0000, 0 0 80px #cc0000;
            line-height: 1.1;
        }
        .hacked-sub {
            font-size: 18px;
            color: #fff;
            text-align: center;
            margin-top: 2rem;
            animation: blink 0.8s infinite;
        }
        .hacked-note {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin-top: 1rem;
        }
        #shroom-hacked {
            width: 140px;
            margin-top: 3rem;
            animation: blink 2.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -4px); }
            60% { transform: translate(-4px, -4px); }
            80% { transform: translate(4px, 4px); }
            100% { transform: translate(0); }
        }
        .glitch { animation: glitch 0.2s infinite, blink 0.6s infinite; }
    </style>
</head>
<body>
    <div class="hacked-text glitch">YOU'VE BEEN<br>HACKED</div>
    <div class="hacked-sub">⚠️ YOUR DATA HAS BEEN COMPROMISED ⚠️</div>
    <div class="hacked-note">[ PROJECT 67 SECURITY BREACH ]</div>
    <img id="shroom-hacked" src="shroom.png" alt="shroom">
</body>
</html>
