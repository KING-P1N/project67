<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROJECT 67 - Sign Up / Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="nav">
      <a class="back" href="index.html">&#8592; HOME</a>
    </div>

    <h1>PROJECT 67</h1>

    <div class="form-container">
      <div class="form-toggle">
        <button
          class="toggle-btn active"
          id="signupBtn"
          onclick="toggleForm('signup')"
        >
          SIGN UP
        </button>
        <button class="toggle-btn" id="loginBtn" onclick="toggleForm('login')">
          LOGIN
        </button>
      </div>

      <!-- SIGN UP FORM -->
      <div class="form-box" id="signupForm" style="display: block">
        <h2>CREATE ACCOUNT</h2>
        <form onsubmit="handleSignup(event)">
          <label for="signup-email">Email</label>
          <input
            type="email"
            id="signup-email"
            placeholder="your@email.com"
            required
          />
          <br /><br />

          <label for="signup-password">Password</label>
          <input
            type="password"
            id="signup-password"
            placeholder="Enter password"
            required
          />
          <br /><br />

          <label for="signup-confirm">Confirm Password</label>
          <input
            type="password"
            id="signup-confirm"
            placeholder="Confirm password"
            required
          />
          <br /><br />

          <button type="reset" class="btn-reset">RESET &#8635;</button>
          <button type="submit" class="btn-submit">SIGN UP &#8594;</button>
        </form>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-box" id="loginForm" style="display: none">
        <h2>LOGIN</h2>
        <form onsubmit="handleLogin(event)">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="your@email.com"
            required
          />
          <br /><br />

          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            placeholder="Enter password"
            required
          />
          <br /><br />

          <button type="reset" class="btn-reset">RESET &#8635;</button>
          <button type="submit" class="btn-submit">LOGIN &#8594;</button>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 PROJECT 67. All rights reserved.</p>
      <a href="contact.html">CONTACT US &#9742;</a>
    </footer>

    <!-- Firebase SDK (Compat version for browser globals) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="script_new.js"></script>
  </body>
</html>
